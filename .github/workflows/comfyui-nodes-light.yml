name: Build ComfyUI Nodes Light Bundle

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Prepare directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force build
          New-Item -ItemType Directory -Force build/custom_nodes

      - name: Clone nodes
        shell: pwsh
        run: |
          cd build/custom_nodes
          git clone https://github.com/numz/ComfyUI-SeedVR2_VideoUpscaler.git
          git clone https://github.com/city96/ComfyUI-GGUF.git
          git clone https://github.com/lquesada/ComfyUI-Inpaint-CropAndStitch.git
          git clone https://github.com/flybirdxx/ComfyUI-Qwen-TTS.git
          git clone https://github.com/rgthree/rgthree-comfy.git
          git clone https://github.com/welltop-cn/ComfyUI-TeaCache.git
          git clone https://github.com/ltdrdata/ComfyUI-Impact-Pack.git
          git clone https://github.com/pollockjj/ComfyUI-MultiGPU.git
          git clone https://github.com/nunchaku-ai/ComfyUI-nunchaku.git
          git clone https://github.com/westNeighbor/ComfyUI-ultimate-openpose-editor.git
          git clone https://github.com/1038lab/ComfyUI-JoyCaption.git

      - name: Merge requirements
        shell: pwsh
        run: |
          $blocked = "torch","torchvision","torchaudio","xformers","triton","onnxruntime","onnxruntime-gpu"
          $allreq = @()

          $files = Get-ChildItem build/custom_nodes -Recurse -Filter requirements.txt
          foreach ($f in $files) {
            Get-Content $f | ForEach-Object {
              $line = $_.Trim()
              if ($line -and -not ($blocked | Where-Object { $line.StartsWith($_) })) {
                $allreq += $line
              }
            }
          }

          $allreq | Sort-Object -Unique | Set-Content build/merged_requirements.txt

      - name: Install merged requirements
        shell: pwsh
        run: |
          pip install -r build/merged_requirements.txt

      - name: Export installed packages list
        run: pip freeze > build/frozen_requirements.txt

      - name: Copy site-packages
        shell: pwsh
        run: |
          $site = python -c "import sysconfig; print(sysconfig.get_paths()['purelib'])"
          New-Item -ItemType Directory -Force build/python_site_packages
          Copy-Item "$site\*" build/python_site_packages -Recurse -Force

      - name: Remove pip caches
        shell: pwsh
        run: |
          Remove-Item build/python_site_packages/pip* -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item build/python_site_packages/setuptools* -Recurse -Force -ErrorAction SilentlyContinue

      - name: Create custom_nodes zip
        shell: pwsh
        run: |
          Compress-Archive build/custom_nodes/* custom_nodes_bundle.zip

      - name: Create python bundle zip
        shell: pwsh
        run: |
          Compress-Archive build/python_site_packages/* python_site_packages.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: comfyui-node-bundle
          path: |
            custom_nodes_bundle.zip
            python_site_packages.zip
            build/merged_requirements.txt
            build/frozen_requirements.txt
