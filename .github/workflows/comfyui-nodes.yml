name: Build ComfyUI Nodes Bundle

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python (ComfyUI portable compatible)
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Upgrade pip
        shell: pwsh
        run: |
          python -m pip install --upgrade pip

      - name: Prepare directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build
          New-Item -ItemType Directory -Force -Path build/custom_nodes

      - name: Clone custom node repositories
        shell: pwsh
        run: |
          cd build/custom_nodes

          git clone https://github.com/numz/ComfyUI-SeedVR2_VideoUpscaler.git
          git clone https://github.com/city96/ComfyUI-GGUF.git
          git clone https://github.com/lquesada/ComfyUI-Inpaint-CropAndStitch.git
          git clone https://github.com/flybirdxx/ComfyUI-Qwen-TTS.git

      - name: Install requirements from all nodes
        shell: pwsh
        run: |
          Get-ChildItem build/custom_nodes -Recurse -Filter requirements.txt | ForEach-Object {
            Write-Host "Installing requirements from $($_.FullName)"
            pip install -r $_.FullName
          }

      - name: Collect python site-packages
        shell: pwsh
        run: |
          $script = @"
import sysconfig, shutil, os

site_packages = sysconfig.get_paths()["purelib"]
target = "build/python_site_packages"

os.makedirs(target, exist_ok=True)
shutil.copytree(site_packages, target, dirs_exist_ok=True)

print("Copied site-packages from:", site_packages)
"@

          Set-Content collect_site_packages.py $script
          python collect_site_packages.py

      - name: Create custom_nodes zip
        shell: pwsh
        run: |
          Compress-Archive -Path build/custom_nodes/* -DestinationPath custom_nodes_bundle.zip

      - name: Create python site-packages zip
        shell: pwsh
        run: |
          Compress-Archive -Path build/python_site_packages/* -DestinationPath python_site_packages.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: comfyui-node-bundle
          path: |
            custom_nodes_bundle.zip
            python_site_packages.zip
