name: Build ComfyUI Nodes Bundle

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Prepare directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build
          New-Item -ItemType Directory -Force -Path build/custom_nodes

      - name: Clone custom node repositories
        shell: pwsh
        run: |
          cd build/custom_nodes
          git clone https://github.com/numz/ComfyUI-SeedVR2_VideoUpscaler.git
          git clone https://github.com/city96/ComfyUI-GGUF.git
          git clone https://github.com/lquesada/ComfyUI-Inpaint-CropAndStitch.git
          git clone https://github.com/flybirdxx/ComfyUI-Qwen-TTS.git

      - name: Install node requirements
        shell: pwsh
        run: |
          $reqs = Get-ChildItem -Path build/custom_nodes -Recurse -Filter requirements.txt
          foreach ($r in $reqs) {
            Write-Host "Installing $($r.FullName)"
            pip install -r $r.FullName
          }

      - name: Copy site-packages
        shell: pwsh
        run: |
          $site = python -c "import sysconfig; print(sysconfig.get_paths()['purelib'])"
          New-Item -ItemType Directory -Force -Path build/python_site_packages
          Copy-Item "$site\*" build/python_site_packages -Recurse -Force

      - name: Create custom_nodes zip
        shell: pwsh
        run: |
          Compress-Archive -Path build/custom_nodes/* -DestinationPath custom_nodes_bundle.zip

      - name: Create python site-packages zip
        shell: pwsh
        run: |
          Compress-Archive -Path build/python_site_packages/* -DestinationPath python_site_packages.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: comfyui-node-bundle
          path: |
            custom_nodes_bundle.zip
            python_site_packages.zip
