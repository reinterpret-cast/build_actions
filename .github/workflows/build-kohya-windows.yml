name: Build Kohya SS Windows Bundle

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Clone kohya_ss
        run: |
          git clone https://github.com/bmaltais/kohya_ss.git
        shell: powershell

      - name: Create venv
        run: |
          cd kohya_ss
          python -m venv venv
        shell: powershell

      - name: Install dependencies
        run: |
          cd kohya_ss
          .\venv\Scripts\activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        shell: powershell

      - name: Collect bundle
        run: |
          Compress-Archive -Path kohya_ss -DestinationPath kohya_ss_windows_bundle.zip
        shell: powershell

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kohya_ss_windows_bundle
          path: kohya_ss_windows_bundle.zip
