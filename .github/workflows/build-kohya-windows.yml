name: Build Kohya CUDA126 Bundle

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Clone kohya_ss with submodules
        run: |
          git clone --recursive https://github.com/bmaltais/kohya_ss.git
        shell: powershell

      - name: Create venv
        run: |
          cd kohya_ss
          python -m venv venv
        shell: powershell

      - name: Install PyTorch CUDA 12.6
        run: |
          cd kohya_ss
          .\venv\Scripts\activate
          python -m pip install --upgrade pip
          pip install torch==2.7.0 torchvision==0.22.0 torchaudio==2.7.0 --index-url https://download.pytorch.org/whl/cu126
        shell: powershell

      - name: Install kohya requirements
        run: |
          cd kohya_ss
          .\venv\Scripts\activate
          pip install -r requirements.txt
        shell: powershell

      - name: Install xformers
        run: |
          cd kohya_ss
          .\venv\Scripts\activate
          pip install xformers
        shell: powershell

      - name: Create archive
        run: |
          Compress-Archive -Path kohya_ss -DestinationPath kohya_ss_cuda126_portable.zip
        shell: powershell

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kohya_ss_cuda126
          path: kohya_ss_cuda126_portable.zip
